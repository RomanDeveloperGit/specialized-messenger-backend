name: Build and publish npm package

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'
          cache: yarn
          registry-url: 'https://registry.npmjs.org'
      - name: Prepare environment file
        run: cp .env.example .env.production
      - name: Install dependencies and generate Prisma client
        run: |
          yarn
          yarn setup:prod
      - name: Build project
        run: yarn build
      - name: Start server in background
        run: yarn start:prod &
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:7070/docs-json > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Attempt $i: server not ready yet, retrying in 2s..."
            sleep 2
          done
      - name: Generate TypeScript types from OpenAPI
        run: |
          mkdir -p npm-package/api
          npx openapi-typescript http://localhost:7070/docs-json --output npm-package/api/types.ts
      - name: Copy constants to npm package
        run: |
          mkdir -p npm-package/constants
          cp src/modules/{chat/chat,auth/auth,invitation/invitation}.constants.ts npm-package/constants/
      - name: Create package.json for npm package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cat > npm-package/package.json << EOF
          {
            "name": "@specialized-messenger/api",
            "version": "${VERSION}",
            "publishConfig": {
              "access": "public"
            }
            "description": "Auto-generated API types and constants",
            "files": ["api/", "constants/"],
            "license": "MIT"
          }
          EOF
      - run: npm whoami
        env:сш
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish package to npm
        working-directory: npm-package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
