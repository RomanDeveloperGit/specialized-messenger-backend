name: Build and publish npm package

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'
          cache: yarn
          registry-url: 'https://registry.npmjs.org'
      - name: Prepare environment file
        run: cp .env.example .env.production
      - name: Install dependencies and generate Prisma client
        run: |
          yarn
          yarn setup:prod
      - name: Build project
        run: yarn build
      - name: Start server in background
        run: yarn start:prod &
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:7070/docs-json > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Attempt $i: server not ready yet, retrying in 2s..."
            sleep 2
          done
      - name: Generate TypeScript types from OpenAPI
        run: |
          # Создаем папку для спецификаций
          mkdir -p npm-package/specs

          # Генерируем типы из OpenAPI
          npx openapi-typescript http://localhost:7070/docs-json --output npm-package/specs/types.ts

          # Создаем index.ts с нашими типами и вспомогательными типами
          cat > npm-package/specs/index.ts << 'EOF'
          import type { components, paths, operations } from './types';

          export type Dto = components['schemas'];

          type HttpMethods =
            | "get"
            | "post"
            | "put"
            | "patch"
            | "delete"
            | "options"
            | "head"
            | "trace";

          type ReplacePathParams<T extends string> =
            T extends `${infer Start}/{${infer _Param}}${infer End}`
              ? `${Start}/${string}${ReplacePathParams<End>}`
              : T;

          type OperationResponse<OpKey extends keyof operations> =
            operations[OpKey]['responses'] extends Record<number, infer R>
              ? R extends { content: infer C }
                ? 'application/json' extends keyof C
                  ? C['application/json']
                  : never
                : never
              : never;

          export type OperationInfo<OpKey extends keyof operations> = {
            body: operations[OpKey]["requestBody"] extends never
              ? undefined
              : operations[OpKey]["requestBody"];
            search: operations[OpKey]['parameters']['query'];
            path: {
              [P in keyof paths]: {
                [M in HttpMethods]: M extends keyof paths[P]
                  ? paths[P][M] extends operations[OpKey]
                    ? P extends string
                      ? ReplacePathParams<P>
                      : never
                    : never
                  : never;
              }[HttpMethods];
            }[keyof paths];
            response: OperationResponse<OpKey>;
          };
          EOF
      - name: Copy constants to npm package
        run: |
          mkdir -p npm-package/constants
          cp src/modules/{chat/chat,auth/auth,invitation/invitation}.constants.ts npm-package/constants/
      - name: Create package.json for npm package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cat > npm-package/package.json << EOF
          {
            "name": "@specialized-messenger/api",
            "version": "${VERSION}",
            "publishConfig": {
              "access": "public"
            },
            "description": "Auto-generated API types and constants",
            "files": ["specs/", "constants/"],
            "license": "MIT"
          }
          EOF
      - name: Publish package to npm
        working-directory: npm-package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
