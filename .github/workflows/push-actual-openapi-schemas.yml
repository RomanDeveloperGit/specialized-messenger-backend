name: Build and attach artifact to release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    name: Build and upload artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.6' # TODO: up
          cache: yarn
      - name: Create .env.production file
        run: cp .env.example .env.production
      - name: Install dependencies and generate prisma
        run: yarn setup:prod
      - name: Build project
        run: yarn build
      - name: Start server in background
        run: yarn start:prod &
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:7070/docs-json > /dev/null && echo "Server is up!" && break
            echo "Attempt $i, retrying in 2s..."
            sleep 2
          done

      - name: Generate TypeScript types from OpenAPI
        run: |
          mkdir -p npm-package
          npx openapi-typescript http://localhost:7070/docs-json --output npm-package/api/types.ts

      - name: Copy constants
        run: |
          mkdir -p npm-package/constants
          cp src/modules/{chat/chat,auth/auth,invitation/invitation}.constants.ts npm-package/constants/

      - name: Create package.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cat > npm-package/package.json << EOF
          {
            "name": "@types/specialized-messenger-backend",
            "version": "${VERSION}",
            "description": "Auto-generated API types and constants",
            "files": ["api/", "constants/"]
          }
          EOF

      - name: Pack into tar.gz
        run: tar -czf api-types.tar.gz -C npm-package .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: api-types.tar.gz
